name: Build PDF and Upload to Release

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install TeX Live
        run: |
          sudo apt update
          sudo apt install -y texlive-latex-extra texlive-xetex latexmk
          sudo apt install -y texlive-lang-chinese

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          # 安装 Sphinx
          pip install sphinx~=9.0.4
          # 安装兼容 Sphinx 9.x 的 mermaid 扩展
          pip install sphinxcontrib-mermaid>=1.0.1
          # 安装其他依赖
          pip install breathe imagesize importlib-metadata sphinx-sitemap sphinxcontrib-applehelp sphinxcontrib-devhelp sphinxcontrib-htmlhelp sphinxcontrib-jsmath sphinxcontrib-qthelp sphinxcontrib-serializinghtml sphinx-copybutton sphinx-design typing-extensions sphinx-reredirects dirsync furo accessible-pygments
          pip install sphinx_rtd_theme

      - name: Build PDF using Sphinx
        run: |
          # 第一步：生成 LaTeX 文件
          sphinx-build -b latex docs/src docs/build/latex
          
          # 第二步：编译 LaTeX 到 PDF
          cd docs/build/latex && latexmk -xelatex -interaction=nonstopmode *.tex
          
          # 第三步：确保构建目录存在 PDF
          mkdir -p docs/build
          cp docs/build/latex/*.pdf docs/build/

      - name: Upload PDF to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          # 根据实际生成的 PDF 文件名调整路径
          files: docs/build/*.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
